name: touchthenumber
description: "数字を1から順にタップしてタイムを競う脳トレ反射神経ゲーム。Touch the Number!"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.2.2
  audioplayers: ^6.7.1
  confetti: ^0.8.0
  window_manager: ^0.5.2
  flutter_riverpod: ^3.3.2
  go_router: ^17.2.3
  in_app_review: ^2.0.12
  share_plus: ^12.0.2
  flutter_localizations:
    sdk: flutter
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true # l10n（lib/l10n/*.arb からの多言語コード生成）

  assets:
    - assets/sounds/

  # 日本語フォント（M PLUS Rounded 1c）。Flutter Web既定のRobotoは日本語グリフを
  # 持たず文字化けするため同梱する。tool/subset_font.py でアプリ使用文字に
  # サブセット済み（元は各3MB超 → 各約200KB）。日本語テキストを追加したら再生成すること。
  fonts:
    - family: MPLUSRounded1c
      fonts:
        - asset: assets/fonts/MPLUSRounded1c-Regular.ttf
          weight: 400
        - asset: assets/fonts/MPLUSRounded1c-Bold.ttf
          weight: 700
