name: Flutter CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一ブランチ/PRで新しいpushが来たら、進行中の古い実行をキャンセルしてCI時間を節約
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # ハングした実行がCI枠を食い潰さないための保険

    permissions:
      contents: read

    steps:
      # ソースコードを取得
      - name: Checkout
        uses: actions/checkout@v7

      # Java (Androidビルド用)
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      # Flutterセットアップ（再現性のためバージョンをピン留め。更新時はここを上げる）
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.35.5"
          cache: true

      # pubパッケージをキャッシュ（.dart_toolは生成物なのでキャッシュしない）
      - name: Cache Pub packages
        uses: actions/cache@v6
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      # Gradleのキャッシュ（Androidビルドを速くする）
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # 依存関係取得
      - name: Get dependencies
        run: flutter pub get

      # 静的解析（PR・push両方で実行してレビュー前に問題を検出）
      - name: Analyze
        run: flutter analyze

      # テスト
      - name: Run tests
        run: flutter test

      # リリースAPKビルド（main への push のみ）
      - name: Build APK
        if: github.event_name == 'push'
        run: flutter build apk --release

      # ビルドしたAPKを成果物としてアップロード
      - name: Upload APK
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
