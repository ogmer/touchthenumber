name: Flutter CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # ソースコードを取得
      - name: Checkout
        uses: actions/checkout@v4

      # Java (Androidビルド用)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Flutterセットアップ
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Pubパッケージをキャッシュ
      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # Gradleキャッシュ
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 依存関係取得
      - name: Get dependencies
        run: flutter pub get

      # テスト
      - name: Run tests
        run: flutter test

      # APKビルド（Push時のみ）
      - name: Build APK
        if: github.event_name == 'push'
        run: flutter build apk --release

      # APKアップロード
      - name: Upload APK
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
