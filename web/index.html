<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!--
    Content Security Policy（XSSなどへの多層防御）について:
    CSPはmetaタグに書くと `flutter run`（デバッグ）のDDCがインラインscript/evalを
    使えなくなり、真っ白な画面で起動できなくなる。またframe-ancestors等はmetaタグでは
    効かない。そのため本番リリースの配信サーバー側でHTTPレスポンスヘッダーとして
    設定すること。CanvasKitレンダラー使用時の例:

      Content-Security-Policy:
        default-src 'self';
        script-src 'self' 'wasm-unsafe-eval' https://www.gstatic.com;
        style-src 'self' 'unsafe-inline';
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob:;
        connect-src 'self' https://www.gstatic.com https://fonts.gstatic.com;
        worker-src 'self' blob:;
        object-src 'none'; base-uri 'self'; frame-ancestors 'none';
      X-Content-Type-Options: nosniff
      Referrer-Policy: no-referrer
  -->
  <meta name="referrer" content="no-referrer">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="touchthenumber">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>touchthenumber</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
